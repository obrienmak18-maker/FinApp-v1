<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FinApp — Gestion Financière</title>
    <meta name="description" content="FinApp — Votre gestionnaire financier personnel, 100 % privé et local-first." />
    <meta name="robots" content="index, follow" />

    <!-- PWA / Android -->
    <meta name="theme-color" content="#0b0f1e" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- PWA / iOS (iPhone & iPad) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FinApp" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

    <!-- Open Graph -->
    <meta property="og:title" content="FinApp — Gestion Financière" />
    <meta property="og:description" content="Votre gestionnaire financier personnel — 100 % privé, local-first." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FinApp — Gestion Financière" />
    <meta name="twitter:description" content="Votre gestionnaire financier personnel — 100 % privé, local-first." />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- iOS safe area & standalone body fill -->
    <style>
      :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
      body { background-color: #0b0f1e; padding-top: var(--sat); padding-bottom: var(--sab); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
