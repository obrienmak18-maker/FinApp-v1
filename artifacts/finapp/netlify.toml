[build]
  base    = "."
  command = "BASE_PATH=/ pnpm --filter @workspace/finapp run build"
  publish = "artifacts/finapp/dist/public"

[build.environment]
  NODE_VERSION = "20"
  BASE_PATH     = "/"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control        = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options   = "DENY"
    X-Content-Type-Options = "nosniff"
